# reload settings
unbind r
bind r source-file ~/.tmux.conf
bind y setw synchronize-panes \; display-message "sync: #{?window_synchronize_panes,on,off}"

# ctrl + g and leader key
unbind C-b
set -g prefix C-g
bind-key C-g send-prefix
set -g mouse on

# Enable OSC52 for tmux
set-option -g set-clipboard on
set -g terminal-overrides ',*:clipboard:enabled'

# vi mode
set -g mode-keys vi

# move focus
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Open new windows and panes in the current pane's working directory.
unbind-key c
unbind-key '"'
unbind-key %
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key P new-window -n "snapshot" -c "#{pane_current_path}" "~/.tmux/scripts/snapshot-pane.sh '#{pane_id}'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'sainnhe/tmux-fzf'

# Configure Catppuccin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Configure Online
set -g @online_icon "#[fg=#{@thm_green},bold]•#[default]"
set -g @offline_icon "#[fg=#{@thm_red},bold]•#[default]"
set -g @route_to_ping "223.5.5.5"

# status left look and feel
set -g status-left-length 120
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold] PREFIX  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_teal}] 󰒋 #H "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{s|$HOME|~|:#{pane_current_path}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?#{!=:#($HOME/Code/dotfiles/.tmux/scripts/status_context.sh git '#{pane_current_path}'),},│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_green}]#{?#{!=:#($HOME/Code/dotfiles/.tmux/scripts/status_context.sh git '#{pane_current_path}'),},  #($HOME/Code/dotfiles/.tmux/scripts/status_context.sh git '#{pane_current_path}') ,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?#{!=:#($HOME/Code/dotfiles/.tmux/scripts/status_context.sh env '#{pane_current_path}' '#{pane_pid}'),},│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_lavender}]#{?#{!=:#($HOME/Code/dotfiles/.tmux/scripts/status_context.sh env '#{pane_current_path}' '#{pane_pid}'),}, 󰆍 #($HOME/Code/dotfiles/.tmux/scripts/status_context.sh env '#{pane_current_path}' '#{pane_pid}') ,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_synchronize_panes,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_red}]#{?window_synchronize_panes, 󰓦 sync ,}"

# status right look and feel
set -g status-right-length 120
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_sky}] 󰌘 #($HOME/Code/dotfiles/.tmux/scripts/status_context.sh ssh '#{pane_tty}' '#{pane_pid}') "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] #($HOME/Code/dotfiles/.tmux/scripts/status_context.sh sys) "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_pink}] 󰈀 #{online_status} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Remove vim-tmux-navigator style Ctrl-h/j/k/l pane switching.
unbind-key -n C-h
unbind-key -n C-j
unbind-key -n C-k
unbind-key -n C-l
unbind-key -n C-\\
unbind-key -T copy-mode-vi C-h
unbind-key -T copy-mode-vi C-j
unbind-key -T copy-mode-vi C-k
unbind-key -T copy-mode-vi C-l
unbind-key -T copy-mode-vi C-\\
bind-key -n C-h send-keys C-h
bind-key -n C-j send-keys C-j
bind-key -n C-k send-keys C-k
bind-key -n C-l send-keys C-l
bind-key -n C-\\ send-keys C-\\
bind-key -T copy-mode-vi C-h send-keys -X cursor-left
bind-key -T copy-mode-vi C-j send-keys -X cursor-down
bind-key -T copy-mode-vi C-k send-keys -X cursor-up
bind-key -T copy-mode-vi C-l send-keys -X cursor-right
bind-key -T copy-mode-vi C-\\ send-keys -X cancel

# Make copy-mode feel closer to Vim and use tmux's built-in clipboard path.
unbind-key -T copy-mode-vi v
unbind-key -T copy-mode-vi V
unbind-key -T copy-mode-vi y
unbind-key -T copy-mode-vi Enter
unbind-key -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel -i --clipboard"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xsel -i --clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel -i --clipboard"

# Configure Tmux
set -g status-interval 5
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"
